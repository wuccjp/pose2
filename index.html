<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>右手抬起偵測 (MediaPipe Pose)</title>
  <style>
    body { margin:0; overflow:hidden; font-family:Arial,Helvetica,sans-serif; }
    #container { position:relative; width:100vw; height:100vh; background:#000; }
    video, canvas {
      position:absolute; top:0; left:0;
      width:100%; height:100%;
      object-fit:cover;
    }
    #msg {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      color:#fff; font-size:2rem; font-weight:bold;
      text-shadow:0 0 8px rgba(0,0,0,0.7);
      pointer-events:none;
    }
  </style>
</head>
<body>
<div id="container">
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="msg"></div>
</div>

<!-- MediaPipe Pose CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.5/drawing_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
